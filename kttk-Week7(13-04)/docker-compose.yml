services:
  kafka:
    image: docker.redpanda.com/redpandadata/redpanda:v24.2.9
    container_name: movie-kafka
    restart: unless-stopped
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - "512M"
      - --reserve-memory
      - "0M"
      - --node-id
      - "0"
      - --check=false
      - --kafka-addr
      - internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr
      - internal://kafka:9092,external://localhost:19092
    ports:
      - "19092:19092"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health --brokers=kafka:9092 >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 10

  user-db:
    image: postgres:16-alpine
    container_name: movie-user-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: userdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - user_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d userdb"]
      interval: 10s
      timeout: 5s
      retries: 10

  booking-db:
    image: postgres:16-alpine
    container_name: movie-booking-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: bookingdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - booking_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bookingdb"]
      interval: 10s
      timeout: 5s
      retries: 10

  user-service:
    build:
      context: ./user-service
    container_name: movie-user-service
    restart: unless-stopped
    environment:
      SERVER_PORT: 8081
      DB_URL: jdbc:postgresql://user-db:5432/userdb
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      user-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "8081:8081"

  movie-service:
    build:
      context: ./movie-service
    container_name: movie-movie-service
    restart: unless-stopped
    environment:
      SERVER_PORT: 8082
    ports:
      - "8082:8082"

  booking-service:
    build:
      context: ./booking-service
    container_name: movie-booking-service
    restart: unless-stopped
    environment:
      SERVER_PORT: 8083
      BOOKING_DB_URL: jdbc:postgresql://booking-db:5432/bookingdb
      BOOKING_DB_USERNAME: postgres
      BOOKING_DB_PASSWORD: postgres
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      USER_SERVICE_BASE_URL: http://user-service:8081
      MOVIE_SERVICE_BASE_URL: http://movie-service:8082
    depends_on:
      booking-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
      user-service:
        condition: service_started
      movie-service:
        condition: service_started
    ports:
      - "8083:8083"

  paynoti-service:
    build:
      context: ./paynoti-service
    container_name: movie-paynoti-service
    restart: unless-stopped
    environment:
      SERVER_PORT: 8084
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      PAYMENT_SIMULATION_MODE: random
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8084:8084"

  frontend:
    build:
      context: ./frontend
      args:
        REACT_APP_GATEWAY_BASE_URL: http://localhost:8083
    container_name: movie-frontend
    restart: unless-stopped
    depends_on:
      booking-service:
        condition: service_started
    ports:
      - "8085:8085"

volumes:
  user_db_data:
  booking_db_data:
