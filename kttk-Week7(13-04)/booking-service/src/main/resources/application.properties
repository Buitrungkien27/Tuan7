server.port=${SERVER_PORT:8083}
spring.application.name=booking-service

spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:19092}

spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.properties.spring.json.value.default.type=com.movie.booking_service.model.Booking
spring.kafka.consumer.properties.spring.json.use.type.headers=false

spring.datasource.url=${BOOKING_DB_URL:jdbc:postgresql://localhost:5432/bookingdb}
spring.datasource.username=${BOOKING_DB_USERNAME:postgres}
spring.datasource.password=${BOOKING_DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

user.service.base-url=${USER_SERVICE_BASE_URL:http://localhost:8081}
movie.service.base-url=${MOVIE_SERVICE_BASE_URL:http://localhost:8082}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true